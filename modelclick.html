		<section>		
			<div class="container" style="margin:15px auto; text-align:center; padding:15px; max-width:450px; margin-top:50px;  width:90%; border:1px solid black; border-radius:10px; background-color:rgba(16, 15, 15, 0.069)!important; box-shadow:0 0 20px black">
				<div class="">

					<h2 style="color:rgb(255, 69, 0) !important; margin-bottom:20px" class="head text-center">Vechile Booking Form</h2>

					<form id="bookingForm" class="form-horizontal" name="myform" action="bookingsubmit.html" 
					onsubmit="return validation()">

						<div class="row" style="margin-left:10px; margin-right:10Px">
							<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
								<div class="form-group">
									<input type="text" class="form-control" placeholder="Enter Name" id="customerName"
									name="name1"required>
								</div>
							</div>

							<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
								<div class="form-group">
									<input type="text" class="form-control" placeholder="Enter Mobile Number" 
									id="mobileNumber" name="mobile1"required>			
								</div>
							</div>
						</div>

						<div class="row" style="margin-left:10px; margin-right:10Px">
							<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
								<div class="form-group">
									<input type="email" class="form-control" placeholder="Enter Email"
									id="email" name="email1"required>
								</div>
							</div>

							<div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
								<div class="form-group">
									<input type="text" class="form-control" placeholder="Enter Address" id="address"
									name="address1"required>
								</div>
							</div>
							
							 <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
								<div class="form-group">
									<textarea class="form-control a2" style="margin-top:0px;font-size:15px;" rows="3" id="msg" placeholder="Enter Message" name="msg1"required></textarea> 
								</div>
							</div>
						</div>
						<div class="row">
						<div class="col-xs-6 col-sm-6 col-md-6 col-lg-6" style="margin-bottom:10px;">
						<button type="submit" class="btn btn-book" value="submit">SUBMIT</button>
						</div>
						<div class="col-xs-6 col-sm-6 col-md-6 col-lg-6">
						<a href="models.html" class="btn btn-book" value="submit">CANCEL</a>
						</div>
						
					</form>

				</div>
			</div>
		</section>
		<script>
			function validation()
		{
			name=document.myform.name1.value;
			email=document.myform.email1.value;
			number=document.myform.mobile1.value;
			address=document.myform.address1.value;
			message=document.myform.message1.value;
			if(name=="")
			{
				alert("Please Enter your Name");
				return false;
			}
			else if(isNaN(number) || number.length!=10)
			{
				alert("Please Enter Valid Mobile Number");
				return false;
			}
			else if(!email.match(/^([A-Za-z0-9]+)@[a-zA-z]+[\.][a-z]{2,5}$/))
			{
				alert("Enter Valid Email");
				return false;
			}
			else if(address=="")
			{
				alert("Please Enter your Name");
				return false;
			}
			else if(message=="")
			{
				alert("Please Enter your Name");
				return false;
			}
			
			else
			{
				return true;
			}
		}
		</script>
